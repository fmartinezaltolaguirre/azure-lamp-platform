name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

jobs:

  build-web:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Web
        uses: docker/build-push-action@v6
        with:
          context: ./app/sample-php-app
          push: true
          tags: |
            ghcr.io/fmartinezaltolaguirre/azure-lamp-platform-web:latest
            ghcr.io/fmartinezaltolaguirre/azure-lamp-platform-web:${{ github.sha }}

  build-jenkins:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Jenkins
        uses: docker/build-push-action@v6
        with:
          context: ./jenkins
          push: true
          tags: |
            ghcr.io/fmartinezaltolaguirre/azure-lamp-platform-jenkins:latest
            ghcr.io/fmartinezaltolaguirre/azure-lamp-platform-jenkins:${{ github.sha }}
